                const isSelected = selectedThreat?.id === threat.id;
                return (
                  <div key={threat.id} className="threat-card" onClick={() => { setSelectedThreat(isSelected ? null : threat); setActiveTab("overview"); }} style={{ background: isSelected ? "#1a2035" : "#0f1623", border: `1px solid ${isSelected ? sev.border : "#1a2a40"}`, borderLeft: `3px solid ${sev.color}`, borderRadius: 4, padding: 16, cursor: "pointer" }}>
                    <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 10 }}>
                      <div style={{ flex: 1, marginRight: 12 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                          <span style={{ background: sev.bg, color: sev.color, padding: "2px 7px", borderRadius: 2, fontSize: 10, fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, letterSpacing: 1 }}>{sev.label}</span>
                          <span style={{ background: `${catColor}15`, color: catColor, padding: "2px 7px", borderRadius: 2, fontSize: 10, fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 0.5 }}>{CATEGORIES.find((c) => c.id === threat.category)?.label}</span>
                        </div>
                        <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 16, fontWeight: 700, color: "#e8edf5", letterSpacing: 0.5 }}>{threat.title}</div>
                      </div>
                      <div style={{ color: isSelected ? sev.color : "#2a3a55", fontSize: 16, flexShrink: 0 }}>{isSelected ? "▼" : "▶"}</div>
                    </div>
                    <div style={{ fontSize: 12, color: "#7d92b0", lineHeight: 1.5, marginBottom: 12 }}>{threat.shortDesc}</div>
                    {/* MITRE pills */}
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                      {threat.mitre.slice(0, 3).map((m) => (
                        <span key={m.id} className="mitre-pill" style={{ background: "rgba(96,165,250,0.1)", border: "1px solid rgba(96,165,250,0.2)", color: "#60a5fa" }}>
                          <span style={{ opacity: 0.6 }}>◈</span> {m.id}
                        </span>
                      ))}
                      {threat.mitre.length > 3 && <span style={{ fontSize: 11, color: "#3a4a60", padding: "3px 6px" }}>+{threat.mitre.length - 3}</span>}
                    </div>
                  </div>
                );
              })}
              {filtered.length === 0 && (
                <div style={{ gridColumn: "1/-1", textAlign: "center", padding: 40, color: "#3a4a60", fontFamily: "'Share Tech Mono', monospace", fontSize: 13 }}>
                  NO THREATS MATCH CURRENT FILTERS
                </div>
              )}
            </div>
          </div>

          {/* Detail Panel */}
          {selectedThreat && (
            <div className="detail-panel" style={{ flex: 1, minWidth: 0, background: "#0f1623", border: `1px solid ${SEVERITY_CONFIG[selectedThreat.severity].border}30`, borderRadius: 4, overflow: "hidden", display: "flex", flexDirection: "column", maxHeight: "calc(100vh - 120px)", position: "sticky", top: 0 }}>
              {/* Detail Header */}
              <div style={{ background: "#0a0f1e", padding: "14px 20px", borderBottom: "1px solid #1a2a40", flexShrink: 0 }}>
                <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                      <span style={{ background: SEVERITY_CONFIG[selectedThreat.severity].bg, color: SEVERITY_CONFIG[selectedThreat.severity].color, padding: "2px 8px", borderRadius: 2, fontSize: 10, fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, letterSpacing: 1 }}>{SEVERITY_CONFIG[selectedThreat.severity].label}</span>
                      <span style={{ background: `${CAT_COLORS[selectedThreat.category]}15`, color: CAT_COLORS[selectedThreat.category], padding: "2px 8px", borderRadius: 2, fontSize: 10, fontFamily: "'Barlow Condensed', sans-serif" }}>{CATEGORIES.find((c) => c.id === selectedThreat.category)?.label}</span>
                    </div>
                    <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 22, fontWeight: 700, color: "#e8edf5", letterSpacing: 0.5 }}>{selectedThreat.title}</div>
                  </div>
                  <button onClick={() => setSelectedThreat(null)} style={{ background: "none", border: "1px solid #1a2a40", borderRadius: 3, color: "#5a7090", padding: "4px 10px", cursor: "pointer", fontSize: 13, flexShrink: 0, marginLeft: 12 }}>✕</button>
                </div>
                {/* Tabs */}
                <div style={{ display: "flex", gap: 2, marginTop: 12 }}>
                  {[["overview", "OVERVIEW"], ["ioc", "IOCs / IOAs"], ["mitre", "MITRE & AZURE"], ["kql", "KQL DETECTION"], ["mitigations", "MITIGATIONS"]].map(([id, label]) => (
                    <button key={id} className="tab-btn" onClick={() => setActiveTab(id)} style={{ padding: "5px 12px", background: activeTab === id ? "#1a2a40" : "transparent", border: activeTab === id ? "1px solid #2a3a55" : "1px solid transparent", borderRadius: "3px 3px 0 0", color: activeTab === id ? "#00d4ff" : "#5a7090", fontSize: 11, fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, letterSpacing: 1, cursor: "pointer" }}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Detail Content */}
              <div style={{ flex: 1, overflowY: "auto", padding: 20 }}>
                {activeTab === "overview" && (
                  <div>
                    <div style={{ fontSize: 13, color: "#a0b4cc", lineHeight: 1.7, marginBottom: 20 }}>{selectedThreat.description}</div>
                    <SectionLabel>ATTACK VECTORS</SectionLabel>
                    <ul style={{ listStyle: "none", marginBottom: 20 }}>
                      {selectedThreat.vectors.map((v, i) => (
                        <li key={i} style={{ display: "flex", gap: 10, marginBottom: 8, fontSize: 12, color: "#8da4bc", lineHeight: 1.5 }}>
                          <span style={{ color: SEVERITY_CONFIG[selectedThreat.severity].color, flexShrink: 0, marginTop: 2 }}>▸</span>
                          <span>{v}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                )}

                {activeTab === "ioc" && (
                  <div>
                    <SectionLabel>INDICATORS OF COMPROMISE (IOCs)</SectionLabel>
                    <div style={{ marginBottom: 20 }}>
                      {selectedThreat.iocs.map((ioc, i) => (
                        <div key={i} style={{ display: "flex", gap: 10, marginBottom: 8, padding: "8px 12px", background: "#111827", borderRadius: 3, border: "1px solid #1a2a40", fontSize: 12, color: "#8da4bc", lineHeight: 1.5 }}>
                          <span style={{ color: "#ff3355", flexShrink: 0 }}>◈</span>
                          <span style={{ fontFamily: "'IBM Plex Mono', monospace" }}>{ioc}</span>
                        </div>
                      ))}
                    </div>
                    <SectionLabel>INDICATORS OF ATTACK (IOAs)</SectionLabel>
                    <div>
                      {selectedThreat.ioas.map((ioa, i) => (
                        <div key={i} style={{ display: "flex", gap: 10, marginBottom: 8, padding: "8px 12px", background: "rgba(255,204,0,0.05)", borderRadius: 3, border: "1px solid rgba(255,204,0,0.15)", fontSize: 12, color: "#c9b060", lineHeight: 1.5 }}>
                          <span style={{ color: "#ffcc00", flexShrink: 0 }}>▸</span>
                          <span style={{ fontFamily: "'IBM Plex Mono', monospace" }}>{ioa}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {activeTab === "mitre" && (
                  <div>
                    <SectionLabel>MITRE ATT&CK TECHNIQUES</SectionLabel>
                    <div style={{ marginBottom: 20 }}>
                      {selectedThreat.mitre.map((m) => (
                        <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8, padding: "10px 14px", background: "rgba(96,165,250,0.07)", border: "1px solid rgba(96,165,250,0.18)", borderRadius: 3 }}>
                          <span style={{ fontFamily: "'Share Tech Mono', monospace", color: "#60a5fa", fontSize: 12, flexShrink: 0, minWidth: 80 }}>{m.id}</span>
                          <div>
                            <div style={{ color: "#c9d8f0", fontSize: 13, fontWeight: 600 }}>{m.name}</div>
                            <div style={{ color: "#5a7090", fontSize: 11, marginTop: 2 }}>{m.tactic}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                    <SectionLabel>AZURE THREAT RESEARCH MATRIX</SectionLabel>
                    <div>
                      {selectedThreat.azureMatrix.map((a, i) => (
                        <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8, padding: "10px 14px", background: "rgba(251,146,60,0.07)", border: "1px solid rgba(251,146,60,0.18)", borderRadius: 3 }}>
                          <span style={{ fontFamily: "'Barlow Condensed', sans-serif", color: "#fb923c", fontSize: 11, fontWeight: 700, letterSpacing: 1, flexShrink: 0, minWidth: 130, textTransform: "uppercase" }}>{a.phase}</span>
                          <span style={{ color: "#c9d8f0", fontSize: 13 }}>{a.technique}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {activeTab === "kql" && (
                  <div>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                      <SectionLabel noMargin>KQL DETECTION QUERY</SectionLabel>
                      <span style={{ fontSize: 10, color: "#34d399", fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 1 }}>Microsoft Sentinel / Log Analytics</span>
                    </div>
                    <div style={{ background: "#070b14", border: "1px solid #1a3a25", borderRadius: 4, padding: 16, borderLeft: "3px solid #34d399" }}>
                      <div className="kql-block" style={{ color: "#a0d4b0" }}>{selectedThreat.kql}</div>
                    </div>
                    <div style={{ marginTop: 12, padding: "8px 12px", background: "rgba(52,211,153,0.07)", border: "1px solid rgba(52,211,153,0.15)", borderRadius: 3, fontSize: 11, color: "#5a7090", lineHeight: 1.6 }}>
                      <span style={{ color: "#34d399" }}>Note: </span>Queries require Microsoft Sentinel with appropriate connectors (Entra ID Sign-in Logs, Audit Logs, Microsoft 365 Defender, Unified Audit Log). Adjust thresholds for your environment.
                    </div>
                  </div>
                )}

                {activeTab === "mitigations" && (
                  <div>
                    <SectionLabel>RECOMMENDED MITIGATIONS</SectionLabel>
                    <div>
                      {selectedThreat.mitigations.map((m, i) => (
                        <div key={i} style={{ display: "flex", gap: 12, marginBottom: 10, padding: "10px 14px", background: "#111827", border: "1px solid #1a2a40", borderRadius: 3 }}>
                          <div style={{ width: 22, height: 22, borderRadius: "50%", background: "rgba(0,212,255,0.12)", border: "1px solid rgba(0,212,255,0.2)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontFamily: "'Share Tech Mono', monospace", fontSize: 10, color: "#00d4ff" }}>{String(i + 1).padStart(2, "0")}</div>
                          <span style={{ fontSize: 13, color: "#a0b4cc", lineHeight: 1.5 }}>{m}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Footer */}
      <div style={{ background: "#0a0f1e", borderTop: "1px solid #1a2a40", padding: "8px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
        <span style={{ fontSize: 10, color: "#2a3a55", fontFamily: "'Share Tech Mono', monospace", letterSpacing: 1 }}>MITRE ATT&CK® FOR ENTERPRISE · AZURE THREAT RESEARCH MATRIX (MSTIC) · MICROSOFT ENTRA ID</span>
        <span style={{ fontSize: 10, color: "#2a3a55", fontFamily: "'Share Tech Mono', monospace" }}>DFIR REFERENCE · {threats.length} THREAT SCENARIOS</span>
      </div>
    </div>
  );
}

function SectionLabel({ children, noMargin }) {
  return (
    <div style={{ fontSize: 10, color: "#3a4a60", letterSpacing: 2, marginBottom: noMargin ? 0 : 12, fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{ flex: 1, height: 1, background: "#1a2a40" }} />
      {children}
      <div style={{ flex: 1, height: 1, background: "#1a2a40" }} />
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ThreatMap));

  </script>
</body>
</html>
