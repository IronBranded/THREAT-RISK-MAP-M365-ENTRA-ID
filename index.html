// ─── COMPONENTS ─────────────────────────────────────────────────────────────

function SectionLabel({ children, color = "#3a4a60" }) {
  return (
    <div style={{ fontSize: 10, color, letterSpacing: 2.5, marginBottom: 14, fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, display: "flex", alignItems: "center", gap: 10 }}>
      <div style={{ flex: 1, height: 1, background: `${color}40` }} />
      {children}
      <div style={{ flex: 1, height: 1, background: `${color}40` }} />
    </div>
  );
}

function SevBadge({ severity }) {
  const s = SEVERITY_CONFIG[severity];
  return (
    <span style={{ background: s.bg, color: s.color, padding: "2px 8px", borderRadius: 2, fontSize: 10, fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, letterSpacing: 1.5, flexShrink: 0 }}>{s.label}</span>
  );
}

function CatBadge({ category }) {
  const cat = CATEGORIES.find(c => c.id === category);
  const color = CAT_COLORS[category] || "#00d4ff";
  return (
    <span style={{ background: `${color}15`, color, padding: "2px 8px", borderRadius: 2, fontSize: 10, fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 0.5, flexShrink: 0 }}>{cat?.label}</span>
  );
}

function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  const handleCopy = () => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <button className="copy-btn" onClick={handleCopy} style={{ background: copied ? "rgba(52,211,153,0.15)" : "rgba(52,211,153,0.07)", border: `1px solid rgba(52,211,153,${copied ? 0.4 : 0.2})`, borderRadius: 3, color: copied ? "#34d399" : "#5a7090", padding: "4px 12px", fontSize: 11, fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 1, display: "flex", alignItems: "center", gap: 6 }}>
      {copied ? "✓ COPIED" : "⎘ COPY KQL"}
    </button>
  );
}

// ─── RUNBOOK TAB ─────────────────────────────────────────────────────────────

function RunbookTab({ runbook, implemented, onToggle }) {
  if (!runbook) return (
    <div style={{ textAlign: "center", padding: 40, color: "#3a4a60", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12 }}>
      RUNBOOK NOT AVAILABLE FOR THIS THREAT
    </div>
  );

  const sections = [
    { key: "triage",      label: "TRIAGE",      color: "#f87171", icon: "⚡" },
    { key: "investigate", label: "INVESTIGATE",  color: "#fb923c", icon: "🔍" },
    { key: "contain",     label: "CONTAIN",      color: "#fbbf24", icon: "🛡" },
    { key: "recover",     label: "RECOVER",      color: "#34d399", icon: "↩" },
    { key: "escalate",    label: "ESCALATE IF",  color: "#e879f9", icon: "▲" },
  ];

  const totalItems = sections.reduce((sum, s) => sum + (runbook[s.key]?.length || 0), 0);
  const implementedCount = Object.values(implemented).filter(Boolean).length;

  return (
    <div>
      {/* Progress Header */}
      <div style={{ background: "#0a0f1e", border: "1px solid #1a2a40", borderRadius: 4, padding: "12px 16px", marginBottom: 20, display: "flex", alignItems: "center", gap: 16 }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, color: "#5a7090", fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 1, marginBottom: 6 }}>RUNBOOK COMPLETION</div>
          <div style={{ height: 4, background: "#1a2a40", borderRadius: 2, overflow: "hidden" }}>
            <div className="progress-bar" style={{ width: `${totalItems > 0 ? (implementedCount / totalItems) * 100 : 0}%`, background: "linear-gradient(90deg, #00d4ff, #34d399)" }} />
          </div>
        </div>
        <div style={{ fontFamily: "'Share Tech Mono', monospace", color: "#00d4ff", fontSize: 18, fontWeight: 700 }}>
          {implementedCount}<span style={{ fontSize: 12, color: "#3a4a60" }}>/{totalItems}</span>
        </div>
      </div>

      {sections.map(({ key, label, color, icon }) => {
        const items = runbook[key];
        if (!items || items.length === 0) return null;
        return (
          <div key={key} style={{ marginBottom: 22 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <div style={{ width: 28, height: 28, borderRadius: 3, background: `${color}18`, border: `1px solid ${color}35`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13 }}>{icon}</div>
              <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 13, fontWeight: 700, color, letterSpacing: 1.5 }}>{label}</span>
              <div style={{ flex: 1, height: 1, background: `${color}20` }} />
              <span style={{ fontFamily: "'Share Tech Mono', monospace", fontSize: 10, color: `${color}80` }}>
                {items.filter((_, i) => implemented[`${key}-${i}`]).length}/{items.length}
              </span>
            </div>
            {items.map((item, i) => {
              const doneKey = `${key}-${i}`;
              const isDone = !!implemented[doneKey];
              return (
                <div key={i} onClick={() => onToggle(doneKey)} style={{ display: "flex", gap: 12, marginBottom: 7, padding: "9px 14px", background: isDone ? `${color}08` : "#0d1420", border: `1px solid ${isDone ? `${color}30` : "#1a2a40"}`, borderRadius: 3, cursor: "pointer", transition: "all 0.15s ease", alignItems: "flex-start" }}>
                  <div style={{ width: 18, height: 18, borderRadius: 3, background: isDone ? `${color}25` : "transparent", border: `1.5px solid ${isDone ? color : "#2a3a55"}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1, transition: "all 0.15s ease" }}>
                    {isDone && <span style={{ color, fontSize: 11, lineHeight: 1 }}>✓</span>}
                  </div>
                  <span style={{ fontSize: 12, color: isDone ? `${color}cc` : "#8da4bc", lineHeight: 1.55, textDecoration: isDone ? "line-through" : "none", fontFamily: "'IBM Plex Mono', monospace", flex: 1 }}>{item}</span>
                  <span style={{ color: "#2a3a55", fontSize: 11, flexShrink: 0, marginTop: 2 }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ─── HEAT MAP VIEW ───────────────────────────────────────────────────────────

function HeatMapView({ threats: filteredThreats, onSelectThreat }) {
  const [expandedCell, setExpandedCell] = useState(null); // key of expanded cell

  const matrix = useMemo(() => {
    const grid = {};
    filteredThreats.forEach(t => {
      const risk = THREAT_RISK[t.id] || { l: 3, i: 3 };
      const key = `${risk.l}-${risk.i}`;
      if (!grid[key]) grid[key] = [];
      grid[key].push(t);
    });
    return grid;
  }, [filteredThreats]);

  const levels = [5, 4, 3, 2, 1]; // rows top→bottom = high→low likelihood
  const impacts = [1, 2, 3, 4, 5]; // cols left→right = low→high impact

  const getCellStyle = (l, imp) => {
    const risk = l * imp;
    if (risk >= 20) return { bg: "rgba(255,51,85,0.14)",  activeBg: "rgba(255,51,85,0.22)",  border: "rgba(255,51,85,0.45)",  glow: "#ff3355", label: "CRITICAL" };
    if (risk >= 15) return { bg: "rgba(255,80,50,0.12)",  activeBg: "rgba(255,80,50,0.20)",   border: "rgba(255,80,50,0.38)",   glow: "#ff5033", label: "HIGH" };
    if (risk >= 9)  return { bg: "rgba(255,136,51,0.12)", activeBg: "rgba(255,136,51,0.20)",  border: "rgba(255,136,51,0.38)", glow: "#ff8833", label: "HIGH" };
    if (risk >= 5)  return { bg: "rgba(255,204,0,0.10)",  activeBg: "rgba(255,204,0,0.18)",   border: "rgba(255,204,0,0.30)",  glow: "#ffcc00", label: "MEDIUM" };
    return           { bg: "rgba(51,170,255,0.06)",  activeBg: "rgba(51,170,255,0.12)",  border: "rgba(51,170,255,0.20)", glow: "#33aaff", label: "LOW" };
  };

  const axisLabel = { 5: "CRITICAL (5)", 4: "HIGH (4)", 3: "MEDIUM (3)", 2: "LOW (2)", 1: "MINIMAL (1)" };
  const axisShort = { 5: "5 — CRITICAL", 4: "4 — HIGH", 3: "3 — MEDIUM", 2: "2 — LOW", 1: "1 — MINIMAL" };

  return (
    <div style={{ padding: "4px 0 20px" }}>
      {/* Header */}
      <div style={{ marginBottom: 24, display: "flex", alignItems: "flex-start", gap: 16 }}>
        <div>
          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 20, fontWeight: 800, color: "#e8edf5", letterSpacing: 1.5, textTransform: "uppercase" }}>Risk Heat Map</div>
          <div style={{ fontSize: 11, color: "#4a6080", fontFamily: "'IBM Plex Mono', monospace", marginTop: 4 }}>
            Likelihood × Impact — each threat independently scored · click any cell to expand
          </div>
        </div>
        <div style={{ flex: 1 }} />
        {/* Risk zone legend */}
        <div style={{ display: "flex", flexDirection: "column", gap: 5, alignItems: "flex-end" }}>
          {[
            ["≥ 20  CRITICAL RISK", "#ff3355"],
            ["≥ 15  HIGH RISK", "#ff5033"],
            ["≥ 9   ELEVATED RISK", "#ff8833"],
            ["≥ 5   MEDIUM RISK", "#ffcc00"],
            ["< 5   LOW RISK", "#33aaff"],
          ].map(([label, color]) => (
            <div key={label} style={{ display: "flex", alignItems: "center", gap: 7 }}>
              <div style={{ width: 22, height: 6, borderRadius: 1, background: color, opacity: 0.75 }} />
              <span style={{ fontSize: 10, color: "#4a6080", fontFamily: "'Share Tech Mono', monospace", letterSpacing: 0.5 }}>{label}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Matrix */}
      <div style={{ display: "flex", gap: 10 }}>
        {/* Y-axis label (rotated) */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          <div style={{ writingMode: "vertical-rl", transform: "rotate(180deg)", fontSize: 10, color: "#2a3a55", fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 3, textTransform: "uppercase", userSelect: "none" }}>
            Likelihood ↑
          </div>
        </div>

        <div style={{ flex: 1, minWidth: 0 }}>
          {/* Column headers (Impact) */}
          <div style={{ display: "grid", gridTemplateColumns: "110px repeat(5, 1fr)", gap: 5, marginBottom: 5 }}>
            <div style={{ display: "flex", alignItems: "flex-end", paddingBottom: 4 }}>
              <span style={{ fontSize: 9, color: "#2a3a55", fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 2 }}>IMPACT →</span>
            </div>
            {impacts.map(imp => (
              <div key={imp} style={{ textAlign: "center", paddingBottom: 6, borderBottom: "1px solid #111c2e" }}>
                <div style={{ fontSize: 11, color: "#4a6080", fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 1, fontWeight: 700 }}>{imp}</div>
                <div style={{ fontSize: 9, color: "#2a3a55", fontFamily: "'Share Tech Mono', monospace", marginTop: 1 }}>
                  {imp === 1 ? "MINIMAL" : imp === 2 ? "LOW" : imp === 3 ? "MEDIUM" : imp === 4 ? "HIGH" : "CRITICAL"}
                </div>
              </div>
            ))}
          </div>

          {/* Rows */}
          {levels.map(l => (
            <div key={l} style={{ display: "grid", gridTemplateColumns: "110px repeat(5, 1fr)", gap: 5, marginBottom: 5 }}>
              {/* Row label */}
              <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", paddingRight: 12, borderRight: "1px solid #111c2e" }}>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 11, color: "#4a6080", fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 1, fontWeight: 700 }}>{l}</div>
                  <div style={{ fontSize: 9, color: "#2a3a55", fontFamily: "'Share Tech Mono', monospace", marginTop: 1 }}>
                    {l === 5 ? "CRITICAL" : l === 4 ? "HIGH" : l === 3 ? "MEDIUM" : l === 2 ? "LOW" : "MINIMAL"}
                  </div>
                </div>
              </div>

              {/* Cells */}
              {impacts.map(imp => {
                const key = `${l}-${imp}`;
                const cellThreats = matrix[key] || [];
                const cs = getCellStyle(l, imp);
                const isExpanded = expandedCell === key;
                const hasThreats = cellThreats.length > 0;
                const riskScore = l * imp;

                return (
                  <div key={imp}
                    onClick={() => hasThreats && setExpandedCell(isExpanded ? null : key)}
                    style={{
                      minHeight: 110,
                      background: hasThreats ? (isExpanded ? cs.activeBg : cs.bg) : "rgba(255,255,255,0.015)",
                      border: `1px solid ${hasThreats ? cs.border : "#0f1825"}`,
                      borderRadius: 4,
                      padding: "10px 10px 8px",
                      display: "flex",
                      flexDirection: "column",
                      gap: 5,
                      cursor: hasThreats ? "pointer" : "default",
                      transition: "all 0.18s ease",
                      boxShadow: hasThreats && isExpanded ? `0 0 18px ${cs.glow}30` : hasThreats ? `0 0 8px ${cs.glow}12` : "none",
                      position: "relative",
                    }}>
                    {/* Risk score watermark */}
                    <div style={{ position: "absolute", bottom: 6, right: 8, fontFamily: "'Share Tech Mono', monospace", fontSize: 20, fontWeight: 700, color: hasThreats ? cs.glow : "#0f1825", opacity: hasThreats ? 0.18 : 0.5, lineHeight: 1 }}>
                      {riskScore}
                    </div>

                    {/* Count badge */}
                    {hasThreats && (
                      <div style={{ position: "absolute", top: 7, right: 8, background: `${cs.glow}25`, border: `1px solid ${cs.glow}40`, borderRadius: 10, padding: "1px 7px", fontFamily: "'Share Tech Mono', monospace", fontSize: 11, fontWeight: 700, color: cs.glow, lineHeight: 1.4 }}>
                        {cellThreats.length}
                      </div>
                    )}

                    {/* Threat list */}
                    {hasThreats ? (
                      <>
                        {cellThreats.slice(0, isExpanded ? 99 : 3).map(t => (
                          <div key={t.id}
                            onClick={e => { e.stopPropagation(); onSelectThreat(t); }}
                            style={{ fontSize: 11, color: cs.glow, fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, lineHeight: 1.25, letterSpacing: 0.3, paddingRight: 22,
                              transition: "opacity 0.12s", cursor: "pointer" }}
                            onMouseEnter={e => e.currentTarget.style.opacity = "0.75"}
                            onMouseLeave={e => e.currentTarget.style.opacity = "1"}>
                            {t.title}
                          </div>
                        ))}
                        {!isExpanded && cellThreats.length > 3 && (
                          <div style={{ fontSize: 10, color: "#3a4a60", fontFamily: "'Share Tech Mono', monospace", marginTop: 2 }}>
                            +{cellThreats.length - 3} more — click to expand
                          </div>
                        )}
                        {isExpanded && (
                          <div style={{ fontSize: 9, color: "#3a4a60", fontFamily: "'Share Tech Mono', monospace", marginTop: 4, borderTop: `1px solid ${cs.glow}20`, paddingTop: 4 }}>
                            CLICK THREAT TO INSPECT · CLICK CELL TO COLLAPSE
                          </div>
                        )}
                      </>
                    ) : (
                      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <div style={{ width: 4, height: 4, borderRadius: "50%", background: "#0f1825" }} />
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}

          {/* X axis label */}
          <div style={{ display: "grid", gridTemplateColumns: "110px 1fr", gap: 5, marginTop: 4 }}>
            <div />
            <div style={{ textAlign: "center" }}>
              <span style={{ fontSize: 9, color: "#2a3a55", fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 3 }}>IMPACT →</span>
            </div>
          </div>
        </div>
      </div>

      {/* Summary stats */}
      <div style={{ marginTop: 24, display: "flex", gap: 10, flexWrap: "wrap" }}>
        {[
          { label: "CRITICAL RISK ZONE (≥20)", color: "#ff3355", count: filteredThreats.filter(t => { const r = THREAT_RISK[t.id] || {l:3,i:3}; return r.l * r.i >= 20; }).length },
          { label: "HIGH RISK ZONE (≥9)", color: "#ff8833", count: filteredThreats.filter(t => { const r = THREAT_RISK[t.id] || {l:3,i:3}; return r.l * r.i >= 9 && r.l * r.i < 20; }).length },
          { label: "MEDIUM RISK ZONE (≥5)", color: "#ffcc00", count: filteredThreats.filter(t => { const r = THREAT_RISK[t.id] || {l:3,i:3}; return r.l * r.i >= 5 && r.l * r.i < 9; }).length },
          { label: "LOW RISK ZONE (<5)", color: "#33aaff", count: filteredThreats.filter(t => { const r = THREAT_RISK[t.id] || {l:3,i:3}; return r.l * r.i < 5; }).length },
        ].map(({ label, color, count }) => count > 0 && (
          <div key={label} style={{ padding: "6px 14px", background: `${color}0d`, border: `1px solid ${color}25`, borderRadius: 3, display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 8, height: 8, borderRadius: 1, background: color, opacity: 0.8 }} />
            <span style={{ fontSize: 10, color: "#4a6080", fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 1 }}>{label}</span>
            <span style={{ fontSize: 14, color, fontFamily: "'Share Tech Mono', monospace", fontWeight: 700 }}>{count}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function ThreatMap() {

  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

  const filtered = useMemo(() => {
    return threats.filter((t) => {
      if (activeCategory !== "all" && t.category !== activeCategory) return false;
      if (activeSeverity !== "all" && t.severity !== activeSeverity) return false;
      if (search) {
        const q = search.toLowerCase();
        return (
          t.title.toLowerCase().includes(q) ||
          t.shortDesc.toLowerCase().includes(q) ||
          t.description.toLowerCase().includes(q) ||
          t.mitre.some((m) => m.id.toLowerCase().includes(q) || m.name.toLowerCase().includes(q)) ||
          t.category.toLowerCase().includes(q)

      }
      return true;
    });
  }, [activeCategory, activeSeverity, search]);

  const statCounts = useMemo(() => {
    const counts = { critical: 0, high: 0, medium: 0, low: 0 };

                  return (
                    <button key={cat.id} className="nav-btn" onClick={() => setActiveCategory(cat.id)} style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "6px 10px", marginBottom: 1, background: isActive ? `${catColor}12` : "transparent", border: isActive ? `1px solid ${catColor}30` : "1px solid transparent", borderRadius: 3, color: isActive ? catColor : "#4a5e78" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                        <span style={{ fontSize: 10 }}>{cat.icon}</span>
                        <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 12, fontWeight: isActive ? 700 : 400, letterSpacing: 0.5 }}>{cat.label}</span>
                      </div>
                      <span style={{ fontFamily: "'Share Tech Mono', monospace", fontSize: 10, color: isActive ? catColor : "#1e2d45" }}>{count}</span>
                    </button>
                  );
                })}
              </div>

              {/* Severity */}
              <div style={{ marginBottom: 18 }}>
                <div style={{ fontSize: 9, color: "#2a3a55", letterSpacing: 2.5, marginBottom: 7, fontFamily: "'Barlow Condensed', sans-serif" }}>SEVERITY</div>
                {SEVERITIES.map((sev) => {
                  const isActive = activeSeverity === sev.id;
                  const sevColor = sev.id === "all" ? "#00d4ff" : SEVERITY_CONFIG[sev.id]?.color || "#00d4ff";
                  return (
                    <button key={sev.id} className="nav-btn" onClick={() => setActiveSeverity(sev.id)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 8, padding: "6px 10px", marginBottom: 1, background: isActive ? `${sevColor}12` : "transparent", border: isActive ? `1px solid ${sevColor}30` : "1px solid transparent", borderRadius: 3, color: isActive ? sevColor : "#4a5e78" }}>
                      {sev.id !== "all" && <div style={{ width: 5, height: 5, borderRadius: "50%", background: sevColor, flexShrink: 0 }} />}
                      <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 12, fontWeight: isActive ? 700 : 400, letterSpacing: 0.5 }}>{sev.label}</span>
                    </button>
                  );
                })}
              </div>

              {/* Clear */}
              {(activeCategory !== "all" || activeSeverity !== "all" || search) && (
                <button className="nav-btn" onClick={() => { setActiveCategory("all"); setActiveSeverity("all"); setSearch(""); }} style={{ width: "100%", padding: "6px 10px", background: "none", border: "1px solid #1e2d45", borderRadius: 3, color: "#4a5e78", fontSize: 11, fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 1.5 }}>
                  ✕ CLEAR FILTERS
                </button>
              )}
            </div>
          )}
        </div>

        {/* ── MAIN CONTENT ── */}
        <div style={{ flex: 1, overflowY: "auto", padding: 16, display: "flex", gap: 16, minWidth: 0 }}>

          {/* Left panel */}
          <div style={{ flex: selectedThreat && (viewMode === "grid" || viewMode === "table") ? "0 0 46%" : 1, minWidth: 0 }}>

            {/* Toolbar */}
            <div style={{ marginBottom: 14, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <span style={{ fontFamily: "'Share Tech Mono', monospace", fontSize: 11, color: "#3a4a60" }}>
                <span style={{ color: "#00d4ff" }}>{filtered.length}</span>/{threats.length} THREATS
              </span>
            </div>

            {viewMode === "grid" && (
              <div style={{ display: "grid", gridTemplateColumns: selectedThreat ? "1fr" : "repeat(auto-fill, minmax(300px, 1fr))", gap: 10 }}>
                {filtered.map((threat) => {
                  const sev = SEVERITY_CONFIG[threat.severity];
                  const catColor = CAT_COLORS[threat.category] || "#00d4ff";
                  const isSelected = selectedThreat?.id === threat.id;
                  return (
                    <div key={threat.id} className="threat-card" onClick={() => handleSelectThreat(threat)} style={{ background: isSelected ? "#101824" : "#0b1018", border: `1px solid ${isSelected ? sev.border + "50" : "#111c2e"}`, borderLeft: `3px solid ${sev.color}`, borderRadius: 4, padding: 14 }}>
                      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 9 }}>
                        <div style={{ flex: 1, marginRight: 10 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5, flexWrap: "wrap" }}>
                            <SevBadge severity={threat.severity} />
                            <CatBadge category={threat.category} />
                          </div>
                          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 15, fontWeight: 700, color: "#e8edf5", letterSpacing: 0.5, lineHeight: 1.2 }}>{threat.title}</div>
                        </div>
                        <div style={{ color: isSelected ? sev.color : "#1e2d45", fontSize: 14, flexShrink: 0, marginTop: 2 }}>{isSelected ? "▼" : "▶"}</div>
                      </div>
                      <div style={{ fontSize: 11.5, color: "#6a82a0", lineHeight: 1.55, marginBottom: 10, fontFamily: "'IBM Plex Mono', monospace" }}>{threat.shortDesc}</div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 4, alignItems: "center" }}>
                        {threat.mitre.slice(0, 3).map((m) => (
                          <span key={m.id} style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "2px 8px", borderRadius: 2, fontSize: 10, fontFamily: "'Share Tech Mono', monospace", background: "rgba(96,165,250,0.08)", border: "1px solid rgba(96,165,250,0.15)", color: "#60a5fa" }}>
                            {m.id}
                          </span>
                        ))}
                        {threat.mitre.length > 3 && <span style={{ fontSize: 10, color: "#2a3a55" }}>+{threat.mitre.length - 3}</span>}
                        {threat.runbook && (
                          <span style={{ marginLeft: "auto", fontSize: 10, color: "#34d39960", fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 1 }}>⚡ RUNBOOK</span>
                        )}
                      </div>
                    </div>
                  );
                })}
                {filtered.length === 0 && (
                  <div style={{ gridColumn: "1/-1", textAlign: "center", padding: 48, color: "#2a3a55", fontFamily: "'Share Tech Mono', monospace", fontSize: 12, letterSpacing: 1 }}>
                    NO THREATS MATCH CURRENT FILTERS
                  </div>
                )}
              </div>
            )}

            {viewMode === "table" && (
              <TableView threats={filtered} onSelectThreat={handleSelectThreat} selectedId={selectedThreat?.id} />
            )}

            {viewMode === "heat" && (
              <HeatMapView threats={filtered} onSelectThreat={handleSelectThreat} />
            )}

            {viewMode === "chain" && (
              <AttackChainView onSelectThreat={handleSelectThreat} />
            )}
          </div>

          {/* Detail Panel */}
          {selectedThreat && (
            <DetailPanel threat={selectedThreat} onClose={() => setSelectedThreat(null)} />
          )}
        </div>
      </div>

      {/* ── FOOTER ── */}
      <div style={{ background: "#07090f", borderTop: "1px solid #111c2e", padding: "6px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
        <span style={{ fontSize: 9, color: "#1e2d45", fontFamily: "'Share Tech Mono', monospace", letterSpacing: 1.5 }}>
          MITRE ATT&CK® FOR ENTERPRISE · AZURE THREAT RESEARCH MATRIX (MSTIC) · MICROSOFT ENTRA ID
        </span>
        <span style={{ fontSize: 9, color: "#1e2d45", fontFamily: "'Share Tech Mono', monospace" }}>
          DFIR REFERENCE · {threats.length} THREAT SCENARIOS · KQL + IR RUNBOOKS
        </span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ThreatMap));
  </script>
</body>
</html>
